services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mitarbeiterverwaltung}
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD muss gesetzt sein}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: Europe/Berlin
      # Pfad zur Claude CLI-Binary im Container (muss zu den Volume-Mounts passen)
      # Beispiel: CLAUDE_CLI_PATH=/root/.nvm/versions/node/v22.14.0/bin/claude
      CLAUDE_CLI_PATH: ${CLAUDE_CLI_PATH:-claude}
    volumes:
      - uploads:/app/uploads
      # Benutzerhandbuch für den Support-Bot
      - ./docs:/app/docs:ro
      # Produktseite (static/produkt.html)
      - ./static:/app/static-pages:ro
      # Claude CLI Credentials (für Support-Bot)
      - /root/.claude:/root/.claude:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8090:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  uploads:
